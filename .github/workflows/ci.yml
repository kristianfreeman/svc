name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate JSON schemas
        run: npm run schema:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate fixture matrix
        run: npm run validate:fixtures
